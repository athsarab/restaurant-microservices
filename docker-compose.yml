services:
  # Microservices
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./api-gateway/.env
    depends_on:
      - user-service
      - menu-service
      - order-service
    networks:
      - restaurant-network

  user-service:
    build: ./user-service
    container_name: user-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./user-service/.env
    networks:
      - restaurant-network

  menu-service:
    build: ./menu-service
    container_name: menu-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - ./menu-service/.env
    networks:
      - restaurant-network

  order-service:
    build: ./order-service
    container_name: order-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file:
      - ./order-service/.env
    depends_on:
      - menu-service
      - user-service
    networks:
      - restaurant-network

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "3004:3004"
    env_file:
      - ./payment-service/.env
    depends_on:
      - order-service
    networks:
      - restaurant-network

  review-service:
    build: ./review-service
    container_name: review-service
    ports:
      - "3005:3005"
    env_file:
      - ./review-service/.env
    depends_on:
      - user-service
      - menu-service
    networks:
      - restaurant-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3000/api}
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - restaurant-network

networks:
  restaurant-network:
    driver: bridge
